<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glatec HR Platform</title>
  <script src="/static/lib/react.min.js"></script>
  <script src="/static/lib/react-dom.min.js"></script>
  <link href="/static/lib/fontawesome.min.css" rel="stylesheet" />
  <style>    /* ── Glatec CI v3.0 ───────────────────────────────────────────────────────
       Primary dark  #1A2B3C   Accent blue  #2E74B5   Secondary  #1F4D78
       Body text     #333333   Muted        #5F6062   Light bg   #F2F2F2
       Font: Arial
    ─────────────────────────────────────────────────────────────────────── */
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Arial,sans-serif;background:#F2F2F2;color:#333333;font-size:14px}
    .app-shell{display:flex;min-height:100vh}

    /* ── Sidebar ─────────────────────────────────────────────────────────── */
    .sidebar{width:240px;background:#1A2B3C;color:#c8d0da;display:flex;flex-direction:column;position:fixed;height:100vh;z-index:100;transition:width .2s}
    .sidebar.collapsed{width:60px}
    .main-content{margin-left:240px;flex:1;display:flex;flex-direction:column;min-height:100vh;transition:margin-left .2s}
    .main-content.expanded{margin-left:60px}
    .sidebar-header{padding:20px 16px 18px;border-bottom:1px solid rgba(255,255,255,.08)}
    .logo-wrap{display:flex;align-items:center;gap:10px}
    .logo-icon{width:36px;height:36px;background:#2E74B5;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#fff;flex-shrink:0;letter-spacing:-.5px}
    .logo-text{font-size:15px;font-weight:700;color:#fff;white-space:nowrap}
    .logo-sub{font-size:10px;color:#7a8ea0;white-space:nowrap;margin-top:1px}
    .sidebar-nav{flex:1;padding:10px 0;overflow-y:auto}
    .nav-sec{padding:10px 16px 4px;font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:#4d6070;white-space:nowrap;overflow:hidden}
    .nav-item{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;color:#8fa3b3;font-size:13px;white-space:nowrap;transition:all .15s;border-left:3px solid transparent}
    .nav-item:hover{background:rgba(46,116,181,.12);color:#c8d8e8}
    .nav-item.active{background:rgba(46,116,181,.18);color:#fff;border-left-color:#2E74B5}
    .nav-item i{width:18px;text-align:center;flex-shrink:0;font-size:13px}
    .sidebar-footer{padding:14px 16px;border-top:1px solid rgba(255,255,255,.08)}
    .user-pill{display:flex;align-items:center;gap:10px}
    .user-avatar{width:32px;height:32px;border-radius:50%;background:#2E74B5;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff;flex-shrink:0}
    .uname{font-size:13px;font-weight:600;color:#dde6ee;white-space:nowrap}
    .urole{font-size:11px;color:#6b8296}
    .logout-btn{background:none;border:none;color:#6b8296;cursor:pointer;padding:6px;border-radius:4px;margin-left:auto}
    .logout-btn:hover{color:#2E74B5}

    /* ── Topbar ───────────────────────────────────────────────────────────── */
    .topbar{background:#fff;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e0e4e8;position:sticky;top:0;z-index:50}
    .topbar-left{display:flex;align-items:center;gap:16px}
    .toggle-btn{background:none;border:none;font-size:17px;cursor:pointer;color:#5F6062;padding:6px;border-radius:4px}
    .toggle-btn:hover{color:#1A2B3C}
    .page-title{font-size:16px;font-weight:700;color:#1A2B3C;letter-spacing:.2px}
    .topbar-right{display:flex;align-items:center;gap:12px}

    /* ── Role badges ──────────────────────────────────────────────────────── */
    .badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:3px;font-size:11px;font-weight:700;letter-spacing:.3px;text-transform:uppercase}
    .badge-admin{background:#1A2B3C;color:#fff}
    .badge-manager{background:#dbe8f5;color:#1F4D78}
    .badge-hr{background:#e6f0f9;color:#2E74B5}
    .badge-payroll{background:#f0f4f8;color:#1A2B3C}

    /* ── Content ──────────────────────────────────────────────────────────── */
    .content-body{padding:24px;flex:1}
    .page-header{margin-bottom:22px;padding-bottom:14px;border-bottom:2px solid #e0e4e8}
    .page-header h2{font-size:20px;font-weight:700;color:#1A2B3C;letter-spacing:.2px}
    .page-header p{color:#5F6062;font-size:13px;margin-top:4px}

    /* ── Cards ────────────────────────────────────────────────────────────── */
    .card{background:#fff;border-radius:4px;padding:20px;border:1px solid #e0e4e8;box-shadow:0 1px 4px rgba(26,43,60,.06)}
    .card-title{font-size:11px;font-weight:700;color:#5F6062;text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px}

    /* ── Stat grid ────────────────────────────────────────────────────────── */
    .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:22px}
    .stat-card{background:#fff;border-radius:4px;padding:18px 20px;border:1px solid #e0e4e8;box-shadow:0 1px 4px rgba(26,43,60,.06)}
    .stat-val{font-size:30px;font-weight:800;line-height:1;color:#1A2B3C}
    .stat-lbl{font-size:11px;color:#5F6062;margin-top:6px;text-transform:uppercase;letter-spacing:.4px}
    .stat-sub{font-size:12px;margin-top:4px;color:#5F6062}
    .stat-card.red{border-top:3px solid #dc2626}
    .stat-card.yellow{border-top:3px solid #d97706}
    .stat-card.green{border-top:3px solid #16a34a}
    .stat-card.blue{border-top:3px solid #2E74B5}

    /* ── Tables ───────────────────────────────────────────────────────────── */
    .table-wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{background:#F2F2F2;padding:9px 14px;text-align:left;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#5F6062;border-bottom:2px solid #d0d5da;white-space:nowrap}
    td{padding:10px 14px;border-bottom:1px solid #edf0f2;vertical-align:middle;color:#333333}
    tr:hover td{background:#f7f9fb}

    /* ── Status badges ────────────────────────────────────────────────────── */
    .sb{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:700;letter-spacing:.2px}
    .sb-min{background:#fef2f2;color:#dc2626}
    .sb-tgt{background:#fffbeb;color:#b45309}
    .sb-ok{background:#f0fdf4;color:#15803d}
    .sb-max{background:#eff6ff;color:#1d4ed8}
    .sb-active{background:#e6f4ea;color:#15803d}
    .sb-inactive{background:#F2F2F2;color:#5F6062}

    /* ── Band bar ─────────────────────────────────────────────────────────── */
    .band-bar{height:5px;background:#e0e4e8;border-radius:2px;width:120px}
    .band-fill{height:100%;border-radius:2px}

    /* ── Login ────────────────────────────────────────────────────────────── */
    .login-wrap{min-height:100vh;background:linear-gradient(160deg,#1A2B3C 0%,#1F4D78 100%);display:flex;align-items:center;justify-content:center}
    .login-card{background:#fff;border-radius:6px;padding:40px;width:380px;box-shadow:0 24px 64px rgba(0,0,0,.25)}
    .login-logo{text-align:center;margin-bottom:28px}
    .login-icon{width:52px;height:52px;background:#2E74B5;border-radius:8px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:20px;color:#fff}
    .login-logo h1{font-size:19px;font-weight:800;color:#1A2B3C;letter-spacing:.3px}
    .login-logo p{font-size:12px;color:#5F6062;margin-top:3px}

    /* ── Forms ────────────────────────────────────────────────────────────── */
    .form-group{margin-bottom:16px}
    .form-label{display:block;font-size:11.5px;font-weight:700;color:#333333;margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px}
    .form-input{width:100%;padding:10px 13px;border:1.5px solid #d0d5da;border-radius:4px;font-size:13.5px;outline:none;font-family:Arial,sans-serif;transition:border .15s}
    .form-input:focus{border-color:#2E74B5;box-shadow:0 0 0 3px rgba(46,116,181,.1)}
    .btn-primary{width:100%;padding:11px;background:#2E74B5;color:#fff;border:none;border-radius:4px;font-size:14px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif;letter-spacing:.3px;transition:background .15s}
    .btn-primary:hover{background:#1F4D78}
    .btn-primary:disabled{background:#b0bec5;cursor:not-allowed}
    .err-msg{background:#fef2f2;color:#dc2626;padding:10px 14px;border-radius:4px;font-size:13px;margin-bottom:16px;border:1px solid #fecaca}
    .sec-note{text-align:center;font-size:11px;color:#8fa3b3;margin-top:20px}

    /* ── Utility ──────────────────────────────────────────────────────────── */
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:22px}
    .mb-4{margin-bottom:16px}
    .mb-6{margin-bottom:22px}
    .flex{display:flex}
    .items-center{align-items:center}
    .justify-between{justify-content:space-between}
    .gap-2{gap:8px}
    .gap-3{gap:12px}
    .text-muted{color:#5F6062}
    .text-sm{font-size:13px}

    /* ── Buttons ──────────────────────────────────────────────────────────── */
    .btn{padding:7px 16px;border-radius:4px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all .15s;font-family:Arial,sans-serif}
    .btn-sm{padding:4px 11px;font-size:12px}
    .btn-danger{background:#fef2f2;color:#dc2626;border-color:#fecaca}
    .btn-danger:hover{background:#fee2e2}
    .btn-success{background:#f0fdf4;color:#15803d;border-color:#bbf7d0}
    .btn-success:hover{background:#dcfce7}
    .btn-blue{background:#eff6ff;color:#2E74B5;border-color:#bfdbfe}
    .btn-blue:hover{background:#dbeafe}
    .btn-gray{background:#F2F2F2;color:#333333;border-color:#d0d5da}
    .btn-gray:hover{background:#e8eaec}

    /* ── Loading ──────────────────────────────────────────────────────────── */
    .loading{display:flex;align-items:center;justify-content:center;padding:48px;color:#5F6062;gap:10px;font-size:13px}
    .spinner{width:20px;height:20px;border:2px solid #e0e4e8;border-top-color:#2E74B5;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── Alert ────────────────────────────────────────────────────────────── */
    .alert{padding:11px 16px;border-radius:4px;font-size:13px;margin-bottom:16px}
    .alert-info{background:#eff6ff;color:#1F4D78;border:1px solid #bfdbfe}

    /* ── Tags ─────────────────────────────────────────────────────────────── */
    .tag{display:inline-block;padding:2px 7px;border-radius:3px;font-size:11px;font-weight:700;letter-spacing:.2px}
    .tag-A{background:#fef2f2;color:#dc2626}
    .tag-B{background:#fffbeb;color:#b45309}
    .tag-C{background:#e6f4ea;color:#15803d}

    /* ── Inputs ───────────────────────────────────────────────────────────── */
    input[type=text],input[type=password],select{padding:7px 11px;border:1.5px solid #d0d5da;border-radius:4px;font-size:13px;outline:none;font-family:Arial,sans-serif;background:#fff;color:#333333}
    input[type=text]:focus,input[type=password]:focus,select:focus{border-color:#2E74B5;box-shadow:0 0 0 3px rgba(46,116,181,.1)}
    code{font-size:11px;background:#F2F2F2;padding:2px 6px;border-radius:3px;color:#1F4D78;font-family:'Courier New',monospace}

    /* ── Lang toggle ──────────────────────────────────────────────────────── */
    .lang-btn{background:#F2F2F2;border:1.5px solid #d0d5da;border-radius:4px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer;color:#1A2B3C;font-family:Arial,sans-serif;letter-spacing:.5px}
    .lang-btn:hover{background:#dbe8f5;border-color:#2E74B5;color:#2E74B5}

    @media(max-width:768px){
      .sidebar{width:60px}
      .sidebar .logo-text,.sidebar .logo-sub,.sidebar .nav-item span,.sidebar .nav-sec,.sidebar .user-info{display:none}
      .main-content{margin-left:60px}
      .grid-2{grid-template-columns:1fr}
      .stat-grid{grid-template-columns:repeat(2,1fr)}
    }

    /* ── Print / EU Transparency Doc ────────────────────────────────────────── */
    .print-doc-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;padding-bottom:14px;border-bottom:2px solid #1A2B3C}
    .print-logo{display:flex;align-items:center;gap:12px}
    .print-doc-title{font-size:15px;font-weight:800;color:#1A2B3C;margin-bottom:10px;padding:10px 14px;background:#f0f4f8;border-left:4px solid #2E74B5;border-radius:2px}
    .print-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#5F6062;margin:20px 0 8px;padding-bottom:4px;border-bottom:1px solid #e0e4e8}
    .print-table{width:100%;border-collapse:collapse;margin-bottom:4px}
    .print-td-label{width:220px;padding:7px 12px;font-size:11.5px;font-weight:700;color:#5F6062;background:#f8fafc;border:1px solid #e8ecf0;text-transform:uppercase;letter-spacing:.3px}
    .print-td-value{padding:7px 14px;font-size:12.5px;color:#1A2B3C;border:1px solid #e8ecf0}
    .print-sig-row{display:flex;gap:40px;margin-top:32px}
    .print-sig-box{flex:1}
    .print-sig-line{border-bottom:1.5px solid #1A2B3C;margin-bottom:6px;height:36px}
    .print-sig-label{font-size:10.5px;color:#5F6062;text-align:center}
    #print-doc{background:#fff;padding:32px;border:1px solid #e0e4e8;border-radius:4px;max-width:900px}
    @media print{
      .sidebar,.topbar,#no-print,.lang-btn,.toggle-btn{display:none!important}
      .main-content{margin-left:0!important}
      .content-body{padding:0!important}
      #print-doc{border:none!important;padding:16px!important;max-width:100%!important}
      body{background:#fff!important}
      @page{margin:1.5cm}
    }
  </style>
</head>
<body>
<div id="root"></div>

<script src="/static/app.js?v=33"></script>
</body>
</html>
